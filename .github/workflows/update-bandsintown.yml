name: Update Bandsintown Events

on:
  schedule:
    - cron: '0 * * * *' # runs every hour
  workflow_dispatch:

jobs:
  fetch-events:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Create data folder
        run: mkdir -p data

      - name: Fetch events from Bandsintown
        run: |
          curl -s "https://rest.bandsintown.com/artists/id_15590844/events?app_id=${{ secrets.BANDSINTOWN }}" -o data/events.json

      - name: Commit and push events
        run: |
          # Set local Git identity for this repo only
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          git add data/events.json
          git commit -m "Update Bandsintown events" || echo "No changes"

          # Push using PAT
          git push https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
