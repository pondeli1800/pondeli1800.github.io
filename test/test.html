<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Pondělí 18:00 - Kontakt</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;700&family=Work+Sans:wght@400;600&display=swap"
        rel="stylesheet">

    <!-- Icon Fonts -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries -->
    <link href="/lib/animate/animate.min.css" rel="stylesheet">
    <link href="/lib/lightbox/css/lightbox.min.css" rel="stylesheet">
    <link href="/lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

    <!-- Bootstrap & Template CSS -->
    <link href="/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>

<body>
    <!-- Spinner Start -->
    <div id="spinner"
        class="show bg-dark position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
        <div class="spinner-grow text-primary" style="width: 3rem; height: 3rem;" role="status"></div>
    </div>
    <!-- Spinner End -->

    <!-- Header Start -->
    <div class="container-fluid p-0">
        <div id="site-header"></div>
        <div class="page-header pb-5">
            <div class="container text-center py-5">
                <h1 class="display-4 text-uppercase mb-3 animated slideInDown">Ozvěte se nám</h1>
                Chcete nás na vašem festivalu, maturáku nebo koncertě? Líbí se vám něco od nás? Nebo nám chcete cokoliv
                sdělit? Ozvěte se nám!
            </div>
        </div>
    </div>
    <!-- Header End -->

    <!-- Contact Section -->
    <div class="container-fluid py-5">
        <div class="container py-5">
            <div class="row g-5">

                <!-- Contact Info -->
                <div class="col-lg-6">
                    <h4 class="lh-base mb-4">Kontakt</h4>
                    <table class="table table-dark mb-0 wow fadeInUp" data-wow-delay="0.3s">
                        <tr>
                            <td>E-MAIL</td>
                            <td><a href="mailto:kontakt@pondeli18-00.cz">kontakt@pondeli18-00.cz</a></td>
                        </tr>
                        <tr>
                            <td>Linktree</td>
                            <td><a href="https://linktr.ee/pondeli18.00">pondeli18.00</a></td>
                        </tr>
                        <tr>
                            <td>Instagram</td>
                            <td><a href="https://www.instagram.com/pondeli_18_00/">pondeli_18_00</a></td>
                        </tr>
                        <tr>
                            <td>Youtube</td>
                            <td><a href="https://www.youtube.com/@pondeli_18_00">@pondeli_18_00</a></td>
                        </tr>
                        <tr>
                            <td>Facebook</td>
                            <td><a href="https://www.facebook.com/pondeli18.00">pondeli18.00</a></td>
                        </tr>
                    </table>
                </div>

                <!-- Custom Form -->
                <div class="col-lg-6 wow fadeInUp" data-wow-delay="0.5s">
                    <h4 class="lh-base mb-4">Chcete nás na vaší akci?</h4>

                    <form id="contact-form" action="https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec" method="POST"
                        class="row g-3">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="email" class="form-control bg-secondary border-0" name="email"
                                    placeholder="Váš email" required>
                                <label>Váš email</label>
                            </div>
                        </div>

                        <div class="col-12">
                            <div class="form-floating">
                                <textarea class="form-control bg-secondary border-0" name="message"
                                    placeholder="Váš vzkaz" style="height:150px" required></textarea>
                                <label>Váš vzkaz</label>
                            </div>
                        </div>

                        <!-- Honeypot -->
                        <input type="text" name="website" style="display:none">

                        <div class="col-12">
                            <button type="submit" class="btn btn-outline-primary border-2 w-100 py-3">Poslat</button>
                        </div>

                        <div class="col-12" id="form-feedback" style="color:#0eefff; font-weight:600;"></div>
                    </form>
                </div>

            </div>
        </div>
    </div>
    <!-- Contact End -->

    <div id="site-footer"></div>

    <!-- Back to Top -->
    <a href="#" class="btn btn-outline-primary border-2 btn-lg-square back-to-top"><i class="bi bi-arrow-up"></i></a>

    <!-- JS Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/lib/wow/wow.min.js"></script>
    <script src="/lib/easing/easing.min.js"></script>
    <script src="/lib/waypoints/waypoints.min.js"></script>
    <script src="/lib/owlcarousel/owl.carousel.min.js"></script>
    <script src="/lib/lightbox/js/lightbox.min.js"></script>

    <!-- Template JS -->
    <script src="/js/main.js"></script>
    <script src="/partials/includes.js"></script>
    <script src="/js/form.js"></script>
</body>
</html>
